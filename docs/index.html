<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Shipping Dashboard Example</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 32px;
            background: #f3f6f9;
            color: #263238;
            font-family: Arial, Helvetica, sans-serif;
        }

        .dashboard {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            margin-bottom: 24px;
        }

        h1 {
            margin: 0 0 8px;
            font-size: 32px;
        }

        .subtitle {
            margin: 0;
            color: #607d8b;
            font-size: 16px;
        }

        .grid {
            display: grid;
            grid-template-columns:
                repeat(2, minmax(0, 1fr));
            gap: 22px;
        }

        .card {
            overflow: hidden;
            padding: 18px;
            background: white;
            border: 1px solid #e0e6eb;
            border-radius: 12px;
            box-shadow:
                0 6px 18px rgba(38, 50, 56, 0.08);
        }

        .card img {
            display: block;
            width: 100%;
            height: auto;
        }

        @media (max-width: 850px) {
            body {
                padding: 18px;
            }

            .grid {
                grid-template-columns: 1fr;
            }

            h1 {
                font-size: 26px;
            }
        }
    </style>
</head>

<body>
    <main class="dashboard">
        <header class="header">
            <h1>Shipping Dashboard Example</h1>

            <p class="subtitle">
                Visually appealing representation
                of shipping data
            </p>
        </header>

        <section class="grid">
            <article class="card">
                <img
                    src="shipping_per_warehouse.png"
                    alt="Shipping per warehouse bar chart"
                >
            </article>

            <article class="card">
                <img
                    src="mode_of_shipment.png"
                    alt="Mode of shipment pie chart"
                >
            </article>

            <article class="card">
                <img
                    src="average_customer_rating.png"
                    alt="Average customer rating gauge"
                >
            </article>

            <article class="card">
                <img
                    src="weight_distribution.png"
                    alt="Weight distribution histogram"
                >
            </article>
        </section>
    </main>
</body>
</html>
